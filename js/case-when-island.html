<script>
/* ---- case_when() island recoding ----
 * Marker slide: .cwi-slide   Stage container: #cwi-stage
 * Shows how case_when() creates a new column for island recoding
 */
(function () {
  const DATA = window.CWI_DATA || [];
  const COLS = window.CWI_COLS || ['species', 'island', 'body_mass_g'];
  const MATCHES = window.CWI_MATCHES || [];
  const LABELS = window.CWI_LABELS || ['Southwest', 'Northwest', 'Northwest'];
  const COND_COLORS = window.CWI_COND_COLORS || ['#e8853a', '#4a86c5', '#9b59b6'];

  const ROW_H = 44, HEADER_H = 40, TABLE_Y = 120;
  const LEFT_X = 50;
  const W_SP = 100, W_IS = 100, W_VAL = 120;
  const ROW_W = W_SP + W_IS + W_VAL;
  const ARROW_GAP = 180;
  const RESULT_X = LEFT_X + ROW_W + ARROW_GAP;
  const W_RESULT = 160;
  const RESULT_ROW_W = W_SP + W_IS + W_VAL + W_RESULT;

  function hexRGB(hex) {
    const n = parseInt(hex.replace('#', ''), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function fade(hex) {
    const [r, g, b] = hexRGB(hex);
    return `rgba(${r}, ${g}, ${b}, 0)`;
  }

  const COND_FILLS = COND_COLORS.map(c => {
    const [r, g, b] = hexRGB(c);
    return `rgba(${r}, ${g}, ${b}, 0.25)`;
  });

  const INK = 'rgb(29, 36, 51)';
  const N = DATA.length;

  let built = false;
  let leftRows = [];
  let condBoxes = [];
  let condSpans = [];
  let equalSpans = [];
  let resultCells = [];
  let arrows = [];
  let newColumnCells = [];

  function rowY(j) { return TABLE_Y + HEADER_H + j * ROW_H; }

  function makeRow(sp, isl, val, isHead, location) {
    const row = document.createElement('div');
    row.className = 'cwi-row' + (isHead ? ' cwi-head' : '');
    const c1 = document.createElement('span'); c1.className = 'cwi-cell cwi-species'; c1.textContent = sp;
    const c2 = document.createElement('span'); c2.className = 'cwi-cell cwi-island'; c2.textContent = isl;
    const c3 = document.createElement('span'); c3.className = 'cwi-cell cwi-value'; c3.textContent = val;
    row.append(c1, c2, c3);
    if (location !== undefined) {
      const c4 = document.createElement('span'); c4.className = 'cwi-cell cwi-location'; c4.textContent = location;
      row.append(c4);
    }
    return row;
  }

  function build() {
    const stage = document.getElementById('cwi-stage');
    if (!stage || built) return !!stage;
    built = true;

    // Title with dynamic condition highlighting
    const title = document.createElement('div');
    title.className = 'cwi-title';
    title.appendChild(document.createTextNode('mutate(island_location = case_when('));

    // Condition 1
    const cond1 = document.createElement('span');
    cond1.className = 'cwi-cond';
    cond1.appendChild(document.createTextNode('island '));
    const eq1 = document.createElement('span');
    eq1.className = 'cwi-equal';
    eq1.textContent = '==';
    equalSpans.push(eq1);
    cond1.appendChild(eq1);
    cond1.appendChild(document.createTextNode(' "Biscoe" ~ "Southwest"'));
    condSpans.push(cond1);
    title.appendChild(cond1);

    title.appendChild(document.createTextNode(', '));

    // Condition 2
    const cond2 = document.createElement('span');
    cond2.className = 'cwi-cond';
    cond2.appendChild(document.createTextNode('island '));
    const eq2 = document.createElement('span');
    eq2.className = 'cwi-equal';
    eq2.textContent = '==';
    equalSpans.push(eq2);
    cond2.appendChild(eq2);
    cond2.appendChild(document.createTextNode(' "Dream" ~ "Northwest"'));
    condSpans.push(cond2);
    title.appendChild(cond2);

    title.appendChild(document.createTextNode(', '));

    // Condition 3
    const cond3 = document.createElement('span');
    cond3.className = 'cwi-cond';
    cond3.appendChild(document.createTextNode('island '));
    const eq3 = document.createElement('span');
    eq3.className = 'cwi-equal';
    eq3.textContent = '==';
    equalSpans.push(eq3);
    cond3.appendChild(eq3);
    cond3.appendChild(document.createTextNode(' "Torgersen" ~ "Northwest"'));
    condSpans.push(cond3);
    title.appendChild(cond3);

    title.appendChild(document.createTextNode('))'));
    stage.appendChild(title);

    // Left table
    const lhead = makeRow(COLS[0], COLS[1], COLS[2], true);
    lhead.style.transform = `translate(${LEFT_X}px, ${TABLE_Y}px)`;
    stage.appendChild(lhead);

    DATA.forEach((d, i) => {
      const row = makeRow(d[0], d[1], d[2], false);
      row.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      stage.appendChild(row);
      leftRows.push(row);

      // Create condition highlight boxes (initially hidden)
      const CELL_PADDING_TOTAL = 24;
      const BOX_WIDTH = W_SP + W_IS + W_VAL + (CELL_PADDING_TOTAL * 3);
      const box = document.createElement('div');
      box.className = 'cwi-cond-box';
      box.style.position = 'absolute';
      box.style.width = `${BOX_WIDTH}px`;
      box.style.height = `${ROW_H}px`;
      box.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      box.style.backgroundColor = 'transparent';
      box.style.pointerEvents = 'none';
      stage.appendChild(box);
      condBoxes.push(box);
    });

    // Result table (with all columns including new island_location)
    const rhead = makeRow(COLS[0], COLS[1], COLS[2], true, 'island_location');
    rhead.style.transform = `translate(${RESULT_X}px, ${TABLE_Y}px)`;
    rhead.style.opacity = 0;
    stage.appendChild(rhead);
    resultCells.push(rhead);

    // Result table rows
    DATA.forEach((d, i) => {
      // Determine label: first condition that matches wins
      let label = '';
      for (let c = 0; c < MATCHES.length; c++) {
        if (MATCHES[c][i]) {
          label = LABELS[c];
          break;
        }
      }

      const row = makeRow(d[0], d[1], d[2], false, label);
      row.style.transform = `translate(${RESULT_X}px, ${rowY(i)}px)`;
      row.style.opacity = 0;
      stage.appendChild(row);
      resultCells.push(row);

      // Track the island_location cells (the 4th cell in each row)
      const locationCell = row.children[3];
      if (locationCell) {
        newColumnCells.push(locationCell);
      }
    });

    // Arrows
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('id', 'cwi-arrows-svg');
    const defs = document.createElementNS(svgNS, 'defs');
    const marker = document.createElementNS(svgNS, 'marker');
    marker.setAttribute('id', 'cwi-arrowhead');
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '8'); marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '7'); marker.setAttribute('markerHeight', '7');
    marker.setAttribute('orient', 'auto-start-reverse');
    const head = document.createElementNS(svgNS, 'path');
    head.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
    head.setAttribute('fill', '#4ac586');
    marker.appendChild(head); defs.appendChild(marker); svg.appendChild(defs);

    const CELL_PADDING_TOTAL = 24;
    const BOX_WIDTH = W_SP + W_IS + W_VAL + (CELL_PADDING_TOTAL * 3);
    const sx = LEFT_X + BOX_WIDTH + 8;
    const dx = RESULT_X - 8;
    DATA.forEach((d, i) => {
      const yy = TABLE_Y + HEADER_H + i * ROW_H + ROW_H / 2;
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('class', 'cwi-arrow');
      p.setAttribute('marker-end', 'url(#cwi-arrowhead)');
      p.setAttribute('d', `M ${sx} ${yy} L ${dx} ${yy}`);
      svg.appendChild(p);
      const len = p.getTotalLength();
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.style.opacity = 0;
      arrows.push({ p, len });
    });
    stage.appendChild(svg);

    return true;
  }

  function render(stage) {
    if (!build()) return;

    const nConds = 3;  // We have 3 conditions
    const showResult = stage >= nConds + 2;  // Stage 5+ (was 4+, now shifted by 1)
    const highlightNew = stage >= nConds + 3;  // Stage 6+ (was 5+, now shifted by 1)

    // Stage 1: Highlight all == operators
    const highlightEquals = stage >= 1;
    equalSpans.forEach(eq => {
      TM.anime({
        targets: eq,
        backgroundColor: highlightEquals ? 'rgba(231, 76, 60, 0.35)' : 'transparent',
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });

    // Stages 2-4: Highlight condition labels in the title
    condSpans.forEach((span, i) => {
      const active = stage === i + 2;  // Stages 2, 3, 4 for conditions 1, 2, 3
      TM.anime({
        targets: span,
        backgroundColor: active ? COND_FILLS[i] : fade(COND_COLORS[i]),
        color: active ? COND_COLORS[i] : INK,
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });

    // Handle row highlighting based on stage
    condBoxes.forEach((box, i) => {
      let bgColor = 'transparent';

      if (!showResult && stage >= 2 && stage <= nConds + 1) {
        // Show current condition's matches (stages 2, 3, 4 for conditions 1, 2, 3)
        const currentCond = stage - 2;
        if (MATCHES[currentCond][i]) {
          bgColor = COND_FILLS[currentCond];
        }
      }

      TM.anime({
        targets: box,
        backgroundColor: bgColor,
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });

    // Draw arrows and show result column
    arrows.forEach(({ p, len }, k) => {
      TM.anime({
        targets: p,
        strokeDashoffset: showResult ? 0 : len,
        opacity: showResult ? 1 : 0,
        duration: 600,
        easing: 'easeInOutCubic',
        delay: showResult ? k * 90 : 0
      });
    });

    TM.anime({
      targets: resultCells,
      opacity: showResult ? 1 : 0,
      duration: 450,
      easing: 'easeInOutQuad',
      delay: showResult ? anime.stagger(50, { start: 520 }) : 0
    });

    // Highlight the new island_location column
    newColumnCells.forEach(cell => {
      TM.anime({
        targets: cell,
        backgroundColor: highlightNew ? 'rgba(74, 197, 134, 0.35)' : 'transparent',
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });
  }

  TM.gate({
    markerClass: 'cwi-slide',
    fragmentIds: ['cwi-equals', 'cwi-cond-1', 'cwi-cond-2', 'cwi-cond-3', 'cwi-result', 'cwi-highlight-new'],
    render
  });
})();
</script>
