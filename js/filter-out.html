<script>
/* ---- filter_out() on two columns ----
 * Marker slide: .fo-slide   Stage container: #fo-stage
 * Left: full dataset. Stage 1 highlights the cells satisfying each column's
 * condition (FO_HITS, one array per column); stage 2 shows which rows will be
 * DROPPED (both conditions match = red X), stage 3 draws arrows + reveals the
 * filtered result keeping only rows where NOT ALL conditions match (keeping NAs).
 * render(stage) is idempotent (stage = number of visible gating fragments).
 */
(function () {
  const TITLE_PRE   = window.FO_TITLE_PRE   || 'filter_out(';
  const CONDS_TEXT  = window.FO_CONDS_TEXT  || [];
  const TITLE_POST  = window.FO_TITLE_POST  || ')';
  const DATA  = window.FO_DATA  || [];
  const COLS  = window.FO_COLS  || ['species', 'island', 'body_mass_g'];
  const HITS  = window.FO_HITS  || [];

  const ROW_H = 44, HEADER_H = 40, TABLE_Y = 90;
  const LEFT_X = 50, RIGHT_X = 720;
  const W_SP = 100, W_IS = 120, W_VAL = 100;
  const ROW_W = W_SP + W_IS + W_VAL;
  // one base colour (hex) per condition column
  const COND_HEX = window.FO_COLORS || ['#e8853a', '#c54a4a'];
  function hexRGB(hex) {
    const n = parseInt(hex.replace('#', ''), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }
  const COND_COLORS = COND_HEX.map(hex => {
    const [r, g, b] = hexRGB(hex);
    return {
      fill: `rgba(${r}, ${g}, ${b}, 0.30)`,
      ink:  `rgb(${Math.round(r * 0.62)}, ${Math.round(g * 0.62)}, ${Math.round(b * 0.62)})`,
    };
  });
  const DROP_COLOR = 'rgba(197, 74, 74, 0.25)';  // red tint for dropped rows
  const KEEP_COLOR = 'rgba(74, 197, 134, 0.20)';  // green tint for kept rows
  const ROW_CLEAR = 'rgba(74, 134, 197, 0)';
  const INK = 'rgb(29, 36, 51)';

  function clear(rgba) {
    const n = rgba.match(/[\d.]+/g) || [0, 0, 0];
    return `rgba(${n[0]}, ${n[1]}, ${n[2]}, 0)`;
  }

  // a row is DROPPED only if ALL conditions match
  const N = DATA.length;
  const DROP = DATA.map((_, i) => HITS.every(col => col[i]));
  const keepIdx = DATA.map((_, i) => i).filter(i => !DROP[i]);
  const M = keepIdx.length;

  let built = false;
  let condSpans = [];
  let leftRows = [];
  let rightEls = [];
  let arrows = [];
  let xMarks = [];  // X marks for dropped rows

  function rowY(j) { return TABLE_Y + HEADER_H + j * ROW_H; }
  function rowCenterY(j) { return rowY(j) + ROW_H / 2; }

  function makeRow(sp, isl, val, isHead) {
    const row = document.createElement('div');
    row.className = 'fo-row' + (isHead ? ' fo-head' : '');
    const c1 = document.createElement('span'); c1.className = 'fo-cell fo-species'; c1.textContent = sp;
    const c2 = document.createElement('span'); c2.className = 'fo-cell fo-island'; c2.textContent = isl;
    const c3 = document.createElement('span'); c3.className = 'fo-cell fo-value'; c3.textContent = val;
    row.append(c1, c2, c3);
    return row;
  }

  function build() {
    const stage = document.getElementById('fo-stage');
    if (!stage || built) return !!stage;
    built = true;

    const title = document.createElement('div');
    title.className = 'fo-title';
    title.appendChild(document.createTextNode(TITLE_PRE));
    CONDS_TEXT.forEach((t, i) => {
      if (i) title.appendChild(document.createTextNode(' & '));
      const s = document.createElement('span');
      s.className = 'fo-code-cond';
      s.textContent = t;
      title.appendChild(s);
      condSpans.push(s);
    });
    title.appendChild(document.createTextNode(TITLE_POST));
    stage.appendChild(title);

    // ---- left table ----
    const lhead = makeRow(COLS[0], COLS[1], COLS[2], true);
    lhead.style.transform = `translate(${LEFT_X}px, ${TABLE_Y}px)`;
    stage.appendChild(lhead);

    DATA.forEach((d, i) => {
      const row = makeRow(d[0], d[1], d[2], false);
      row.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      stage.appendChild(row);
      leftRows.push(row);

      // Add X mark for rows that will be dropped
      if (DROP[i]) {
        const xMark = document.createElement('div');
        xMark.className = 'fo-x-mark';
        xMark.textContent = '✗';
        xMark.style.transform = `translate(${LEFT_X - 35}px, ${rowY(i) + 8}px)`;
        xMark.style.opacity = 0;
        stage.appendChild(xMark);
        xMarks.push(xMark);
      } else {
        xMarks.push(null);
      }
    });

    // ---- right table (hidden until final stage) ----
    const rhead = makeRow(COLS[0], COLS[1], COLS[2], true);
    rhead.style.transform = `translate(${RIGHT_X}px, ${TABLE_Y}px)`;
    rhead.style.opacity = 0;
    stage.appendChild(rhead);
    rightEls.push(rhead);

    keepIdx.forEach((srcI, j) => {
      const d = DATA[srcI];
      const row = makeRow(d[0], d[1], d[2], false);
      row.style.transform = `translate(${RIGHT_X}px, ${rowY(j)}px)`;
      row.style.opacity = 0;
      stage.appendChild(row);
      rightEls.push(row);
    });

    // ---- arrows (svg overlay) ----
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('id', 'fo-arrows-svg');
    const defs = document.createElementNS(svgNS, 'defs');
    const marker = document.createElementNS(svgNS, 'marker');
    marker.setAttribute('id', 'fo-arrowhead');
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '8'); marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '7'); marker.setAttribute('markerHeight', '7');
    marker.setAttribute('orient', 'auto-start-reverse');
    const head = document.createElementNS(svgNS, 'path');
    head.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
    head.setAttribute('fill', '#4ac586');
    marker.appendChild(head); defs.appendChild(marker); svg.appendChild(defs);

    const sx = LEFT_X + ROW_W + 6;
    const dx = RIGHT_X - 8;
    keepIdx.forEach((srcI, j) => {
      const syy = rowCenterY(srcI), dyy = rowCenterY(j);
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('class', 'fo-arrow');
      p.setAttribute('marker-end', 'url(#fo-arrowhead)');
      p.setAttribute('d', `M ${sx} ${syy} C ${sx + 100} ${syy}, ${dx - 100} ${dyy}, ${dx} ${dyy}`);
      svg.appendChild(p);
      const len = p.getTotalLength();
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.style.opacity = 0;
      arrows.push({ p, len });
    });
    stage.appendChild(svg);

    return true;
  }

  function render(stage) {
    if (!build()) return;

    // stages 1..nConds: highlight one condition's matching cells per step
    const nConds = HITS.length;
    condSpans.forEach((s, c) => {
      const hi = stage >= c + 1;
      const cc = COND_COLORS[c % COND_COLORS.length];
      TM.anime({
        targets: s,
        backgroundColor: hi ? cc.fill : clear(cc.fill),
        color: hi ? cc.ink : INK,
        duration: 450, easing: 'easeInOutQuad',
      });
    });

    leftRows.forEach((row, i) => {
      const cells = row.querySelectorAll('.fo-cell');
      HITS.forEach((col, c) => {
        if (!col[i]) return;
        const hi = stage >= c + 1;
        const cc = COND_COLORS[c % COND_COLORS.length];
        const cell = cells[c + 1];  // +1 because species is first
        if (cell) {
          cell.classList.toggle('fo-hit', hi);
          TM.anime({
            targets: cell,
            backgroundColor: hi ? cc.fill : clear(cc.fill),
            color: hi ? cc.ink : INK,
            duration: 450, easing: 'easeInOutQuad',
          });
        }
      });
    });

    // next stage: show which rows will be DROPPED (both conditions match = red)
    // and which will be KEPT (at least one condition false = green, including NA)
    const both = stage >= nConds + 1;
    leftRows.forEach((row, i) => {
      const bgColor = both ? (DROP[i] ? DROP_COLOR : KEEP_COLOR) : ROW_CLEAR;
      TM.anime({
        targets: row,
        backgroundColor: bgColor,
        duration: 450, easing: 'easeInOutQuad',
      });
    });

    // Show X marks on dropped rows
    xMarks.forEach((xMark, i) => {
      if (!xMark) return;
      TM.anime({
        targets: xMark,
        opacity: both && DROP[i] ? 1 : 0,
        duration: 450, easing: 'easeInOutQuad',
      });
    });

    // final stage: draw arrows to kept rows, fade out dropped rows
    const show = stage >= nConds + 2;
    leftRows.forEach((row, i) => {
      TM.anime({
        targets: row,
        opacity: show && DROP[i] ? 0.15 : 1,
        duration: 450, easing: 'easeInOutQuad',
      });
    });

    arrows.forEach(({ p, len }, k) => {
      TM.anime({
        targets: p,
        strokeDashoffset: show ? 0 : len,
        opacity: show ? 1 : 0,
        duration: 600, easing: 'easeInOutCubic',
        delay: show ? k * 90 : 0,
      });
    });

    TM.anime({
      targets: rightEls,
      opacity: show ? 1 : 0,
      duration: 450, easing: 'easeInOutQuad',
      delay: show ? anime.stagger(50, { start: 520 }) : 0,
    });
  }

  TM.gate({
    markerClass: 'fo-slide',
    fragmentIds: ['fo-cond-1', 'fo-cond-2', 'fo-both', 'fo-arrows'],
    render,
  });
})();
</script>
