<script>
/* ---- recode_values() with unmatched = "error" ----
 * Marker slide: .rve-slide   Stage container: #rve-stage
 * Shows how recode_values() errors on unmatched values when unmatched = "error"
 */
(function () {
  const DATA = window.RVE_DATA || [];
  const COLS = window.RVE_COLS || ['species', 'island', 'body_mass_g'];
  const MATCHES = window.RVE_MATCHES || [];
  const LABELS = window.RVE_LABELS || ['Southwest', 'Northwest', 'Northwest'];
  const VALUE_COLORS = window.RVE_VALUE_COLORS || ['#e8853a', '#4a86c5', '#9b59b6'];

  const ROW_H = 44, HEADER_H = 40, TABLE_Y = 120;
  const LEFT_X = 50;
  const W_SP = 100, W_IS = 100, W_VAL = 120;
  const ROW_W = W_SP + W_IS + W_VAL;
  const ARROW_GAP = 180;
  const RESULT_X = LEFT_X + ROW_W + ARROW_GAP;
  const W_RESULT = 160;

  function hexRGB(hex) {
    const n = parseInt(hex.replace('#', ''), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function fade(hex) {
    const [r, g, b] = hexRGB(hex);
    return `rgba(${r}, ${g}, ${b}, 0)`;
  }

  const VALUE_FILLS = VALUE_COLORS.map(c => {
    const [r, g, b] = hexRGB(c);
    return `rgba(${r}, ${g}, ${b}, 0.25)`;
  });

  const INK = 'rgb(29, 36, 51)';
  const ERROR_COLOR = 'rgba(231, 76, 60, 0.35)';
  const N = DATA.length;

  // Find unmatched row
  const UNMATCHED_ROW = DATA.findIndex((_, i) =>
    !MATCHES.some(match => match[i])
  );

  let built = false;
  let leftRows = [];
  let condBoxes = [];
  let valueSpans = [];
  let resultCells = [];
  let arrows = [];
  let errorBox;

  function rowY(j) { return TABLE_Y + HEADER_H + j * ROW_H; }

  function makeRow(sp, isl, val, isHead, location) {
    const row = document.createElement('div');
    row.className = 'rve-row' + (isHead ? ' rve-head' : '');
    const c1 = document.createElement('span'); c1.className = 'rve-cell rve-species'; c1.textContent = sp;
    const c2 = document.createElement('span'); c2.className = 'rve-cell rve-island'; c2.textContent = isl;
    const c3 = document.createElement('span'); c3.className = 'rve-cell rve-value'; c3.textContent = val;
    row.append(c1, c2, c3);
    if (location !== undefined) {
      const c4 = document.createElement('span'); c4.className = 'rve-cell rve-location'; c4.textContent = location;
      row.append(c4);
    }
    return row;
  }

  function build() {
    const stage = document.getElementById('rve-stage');
    if (!stage || built) return !!stage;
    built = true;

    // Title
    const title = document.createElement('div');
    title.className = 'rve-title';
    title.appendChild(document.createTextNode('mutate(island_location = island |> recode_values('));

    const val1 = document.createElement('span');
    val1.className = 'rve-val';
    val1.textContent = '"Biscoe" ~ "Southwest"';
    valueSpans.push(val1);
    title.appendChild(val1);

    title.appendChild(document.createTextNode(', '));

    const val2 = document.createElement('span');
    val2.className = 'rve-val';
    val2.textContent = '"Dream" ~ "Northwest"';
    valueSpans.push(val2);
    title.appendChild(val2);

    title.appendChild(document.createTextNode(', '));

    const val3 = document.createElement('span');
    val3.className = 'rve-val';
    val3.textContent = '"Torgersen" ~ "Northwest"';
    valueSpans.push(val3);
    title.appendChild(val3);

    const unmatchedSpan = document.createElement('span');
    unmatchedSpan.className = 'rve-unmatched';
    unmatchedSpan.textContent = ', unmatched = "error"';
    title.appendChild(unmatchedSpan);

    title.appendChild(document.createTextNode('))'));
    stage.appendChild(title);

    // Left table
    const lhead = makeRow(COLS[0], COLS[1], COLS[2], true);
    lhead.style.transform = `translate(${LEFT_X}px, ${TABLE_Y}px)`;
    stage.appendChild(lhead);

    DATA.forEach((d, i) => {
      const row = makeRow(d[0], d[1], d[2], false);
      row.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      stage.appendChild(row);
      leftRows.push(row);

      // Create value highlight boxes
      const CELL_PADDING_TOTAL = 24;
      const BOX_WIDTH = W_SP + W_IS + W_VAL + (CELL_PADDING_TOTAL * 3);
      const box = document.createElement('div');
      box.className = 'rve-cond-box';
      box.style.position = 'absolute';
      box.style.width = `${BOX_WIDTH}px`;
      box.style.height = `${ROW_H}px`;
      box.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      box.style.backgroundColor = 'transparent';
      box.style.pointerEvents = 'none';
      stage.appendChild(box);
      condBoxes.push(box);
    });

    // Result table (partial - will be stopped by error)
    const rhead = makeRow(COLS[0], COLS[1], COLS[2], true, 'island_location');
    rhead.style.transform = `translate(${RESULT_X}px, ${TABLE_Y}px)`;
    rhead.style.opacity = 0;
    stage.appendChild(rhead);
    resultCells.push(rhead);

    // Only add rows up to the unmatched one
    DATA.forEach((d, i) => {
      let label = '';
      for (let c = 0; c < MATCHES.length; c++) {
        if (MATCHES[c][i]) {
          label = LABELS[c];
          break;
        }
      }

      const row = makeRow(d[0], d[1], d[2], false, label || '?');
      row.style.transform = `translate(${RESULT_X}px, ${rowY(i)}px)`;
      row.style.opacity = 0;
      stage.appendChild(row);
      resultCells.push(row);
    });

    // Arrows
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('id', 'rve-arrows-svg');
    const defs = document.createElementNS(svgNS, 'defs');
    const marker = document.createElementNS(svgNS, 'marker');
    marker.setAttribute('id', 'rve-arrowhead');
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '8'); marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '7'); marker.setAttribute('markerHeight', '7');
    marker.setAttribute('orient', 'auto-start-reverse');
    const head = document.createElementNS(svgNS, 'path');
    head.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
    head.setAttribute('fill', '#4ac586');
    marker.appendChild(head); defs.appendChild(marker); svg.appendChild(defs);

    const CELL_PADDING_TOTAL = 24;
    const BOX_WIDTH = W_SP + W_IS + W_VAL + (CELL_PADDING_TOTAL * 3);
    const sx = LEFT_X + BOX_WIDTH + 8;
    const dx = RESULT_X - 8;
    DATA.forEach((d, i) => {
      const yy = TABLE_Y + HEADER_H + i * ROW_H + ROW_H / 2;
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('class', 'rve-arrow');
      p.setAttribute('marker-end', 'url(#rve-arrowhead)');
      p.setAttribute('d', `M ${sx} ${yy} L ${dx} ${yy}`);
      svg.appendChild(p);
      const len = p.getTotalLength();
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.style.opacity = 0;
      arrows.push({ p, len });
    });
    stage.appendChild(svg);

    // Error box overlay
    errorBox = document.createElement('div');
    errorBox.className = 'rve-error-box';
    errorBox.innerHTML = `
      <div class="rve-error-line">#> Error in \`mutate()\`:</div>
      <div class="rve-error-line">ℹ In argument: \`island_location = island |> recode_values(..., unmatched = "error")\`.</div>
      <div class="rve-error-line">Caused by error in \`recode_values()\`:</div>
      <div class="rve-error-line">! Each location must be matched.</div>
      <div class="rve-error-line">✖ Location ${UNMATCHED_ROW + 1} is unmatched.</div>
    `;
    errorBox.style.opacity = 0;
    stage.appendChild(errorBox);

    return true;
  }

  function render(stage) {
    if (!build()) return;

    const nValues = 3;
    const showAttempt = stage >= nValues + 1;  // Stage 4
    const showError = stage >= nValues + 2;    // Stage 5

    // Highlight value labels in the title
    valueSpans.forEach((span, i) => {
      const active = stage === i + 1;
      TM.anime({
        targets: span,
        backgroundColor: active ? VALUE_FILLS[i] : fade(VALUE_COLORS[i]),
        color: active ? VALUE_COLORS[i] : INK,
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });

    // Handle row highlighting based on stage
    condBoxes.forEach((box, i) => {
      let bgColor = 'transparent';

      if (!showAttempt && stage >= 1 && stage <= nValues) {
        const currentValue = stage - 1;
        if (MATCHES[currentValue][i]) {
          bgColor = VALUE_FILLS[currentValue];
        }
      }

      // Highlight unmatched row in error stage
      if (showError && i === UNMATCHED_ROW) {
        bgColor = ERROR_COLOR;
      }

      TM.anime({
        targets: box,
        backgroundColor: bgColor,
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });

    // Show partial result attempt
    if (showAttempt && !showError) {
      arrows.forEach(({ p, len }, k) => {
        TM.anime({
          targets: p,
          strokeDashoffset: 0,
          opacity: 1,
          duration: 600,
          easing: 'easeInOutCubic',
          delay: k * 90
        });
      });

      TM.anime({
        targets: resultCells,
        opacity: 1,
        duration: 450,
        easing: 'easeInOutQuad',
        delay: anime.stagger(50, { start: 520 })
      });
    } else if (!showAttempt) {
      arrows.forEach(({ p, len }) => {
        TM.anime({
          targets: p,
          strokeDashoffset: len,
          opacity: 0,
          duration: 450,
          easing: 'easeInOutQuad'
        });
      });

      TM.anime({
        targets: resultCells,
        opacity: 0,
        duration: 450,
        easing: 'easeInOutQuad'
      });
    }

    // Show error
    if (showError) {
      // Hide the partial result
      TM.anime({
        targets: [...resultCells, ...arrows.map(a => a.p)],
        opacity: 0,
        duration: 300,
        easing: 'easeInOutQuad'
      });

      // Show error box
      TM.anime({
        targets: errorBox,
        opacity: 1,
        duration: 450,
        delay: 300,
        easing: 'easeInOutQuad'
      });
    } else {
      TM.anime({
        targets: errorBox,
        opacity: 0,
        duration: 450,
        easing: 'easeInOutQuad'
      });
    }
  }

  TM.gate({
    markerClass: 'rve-slide',
    fragmentIds: ['rve-val-1', 'rve-val-2', 'rve-val-3', 'rve-attempt', 'rve-error'],
    render
  });
})();
</script>
