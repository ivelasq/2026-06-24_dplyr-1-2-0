<script>
/* ---- case_when() - creating new column based on conditions ----
 * Marker slide: .cw-slide   Stage container: #cw-stage
 * Shows how case_when() creates a new column by evaluating conditions
 */
(function () {
  const DATA = window.CW_DATA || [];
  const COLS = window.CW_COLS || ['species', 'island', 'body_mass_g'];
  const MATCHES = window.CW_MATCHES || [];
  const LABELS = window.CW_LABELS || ['Large', 'Small'];
  const COND_COLORS = window.CW_COND_COLORS || ['#e8853a', '#4a86c5'];

  const ROW_H = 44, HEADER_H = 40, TABLE_Y = 120;
  const LEFT_X = 50;
  const W_SP = 100, W_IS = 100, W_VAL = 120;
  const ROW_W = W_SP + W_IS + W_VAL;
  const ARROW_GAP = 180;
  const RESULT_X = LEFT_X + ROW_W + ARROW_GAP;
  const W_RESULT = 140;
  const RESULT_ROW_W = W_SP + W_IS + W_VAL + W_RESULT;

  function hexRGB(hex) {
    const n = parseInt(hex.replace('#', ''), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function fade(hex) {
    const [r, g, b] = hexRGB(hex);
    return `rgba(${r}, ${g}, ${b}, 0)`;
  }

  const COND_FILLS = COND_COLORS.map(c => {
    const [r, g, b] = hexRGB(c);
    return `rgba(${r}, ${g}, ${b}, 0.25)`;
  });

  const INK = 'rgb(29, 36, 51)';
  const N = DATA.length;

  let built = false;
  let leftRows = [];
  let condBoxes = [];
  let condSpans = [];
  let resultCells = [];
  let arrows = [];
  let newColumnCells = [];

  function rowY(j) { return TABLE_Y + HEADER_H + j * ROW_H; }

  function makeRow(sp, isl, val, isHead, sizeCategory) {
    const row = document.createElement('div');
    row.className = 'cw-row' + (isHead ? ' cw-head' : '');
    const c1 = document.createElement('span'); c1.className = 'cw-cell cw-species'; c1.textContent = sp;
    const c2 = document.createElement('span'); c2.className = 'cw-cell cw-island'; c2.textContent = isl;
    const c3 = document.createElement('span'); c3.className = 'cw-cell cw-value'; c3.textContent = val;
    row.append(c1, c2, c3);
    if (sizeCategory !== undefined) {
      const c4 = document.createElement('span'); c4.className = 'cw-cell cw-size-cat'; c4.textContent = sizeCategory;
      row.append(c4);
    }
    return row;
  }

  function build() {
    const stage = document.getElementById('cw-stage');
    if (!stage || built) return !!stage;
    built = true;

    // Title with dynamic condition highlighting
    const title = document.createElement('div');
    title.className = 'cw-title';
    title.appendChild(document.createTextNode('mutate(size_category = case_when('));

    const cond1 = document.createElement('span');
    cond1.className = 'cw-cond';
    cond1.textContent = 'body_mass_g > 4500 ~ "Large"';
    condSpans.push(cond1);
    title.appendChild(cond1);

    title.appendChild(document.createTextNode(', '));

    const cond2 = document.createElement('span');
    cond2.className = 'cw-cond';
    cond2.textContent = 'body_mass_g < 4500 ~ "Small"';
    condSpans.push(cond2);
    title.appendChild(cond2);

    title.appendChild(document.createTextNode('))'));
    stage.appendChild(title);

    // Left table
    const lhead = makeRow(COLS[0], COLS[1], COLS[2], true);
    lhead.style.transform = `translate(${LEFT_X}px, ${TABLE_Y}px)`;
    stage.appendChild(lhead);

    DATA.forEach((d, i) => {
      const row = makeRow(d[0], d[1], d[2], false);
      row.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      stage.appendChild(row);
      leftRows.push(row);

      // Create condition highlight boxes (initially hidden)
      // Need to account for cell padding (12px each side per cell = 24px per cell)
      const CELL_PADDING_TOTAL = 24;
      const BOX_WIDTH = W_SP + W_IS + W_VAL + (CELL_PADDING_TOTAL * 3);
      const box = document.createElement('div');
      box.className = 'cw-cond-box';
      box.style.position = 'absolute';
      box.style.width = `${BOX_WIDTH}px`;
      box.style.height = `${ROW_H}px`;
      box.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      box.style.backgroundColor = 'transparent';
      box.style.pointerEvents = 'none';
      stage.appendChild(box);
      condBoxes.push(box);
    });

    // Result table (with all columns including new size_category)
    const rhead = makeRow(COLS[0], COLS[1], COLS[2], true, 'size_category');
    rhead.style.transform = `translate(${RESULT_X}px, ${TABLE_Y}px)`;
    rhead.style.opacity = 0;
    stage.appendChild(rhead);
    resultCells.push(rhead);

    // Result table rows
    DATA.forEach((d, i) => {
      // Determine label: first condition that matches wins
      const label = MATCHES[0][i] ? LABELS[0] : LABELS[1];

      const row = makeRow(d[0], d[1], d[2], false, label);
      row.style.transform = `translate(${RESULT_X}px, ${rowY(i)}px)`;
      row.style.opacity = 0;
      stage.appendChild(row);
      resultCells.push(row);

      // Track the size_category cells (the 4th cell in each row)
      const sizeCatCell = row.children[3];
      if (sizeCatCell) {
        newColumnCells.push(sizeCatCell);
      }
    });

    // Arrows
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('id', 'cw-arrows-svg');
    const defs = document.createElementNS(svgNS, 'defs');
    const marker = document.createElementNS(svgNS, 'marker');
    marker.setAttribute('id', 'cw-arrowhead');
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '8'); marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '7'); marker.setAttribute('markerHeight', '7');
    marker.setAttribute('orient', 'auto-start-reverse');
    const head = document.createElementNS(svgNS, 'path');
    head.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
    head.setAttribute('fill', '#4ac586');
    marker.appendChild(head); defs.appendChild(marker); svg.appendChild(defs);

    // Arrow should start after all left table columns including padding
    const CELL_PADDING_TOTAL = 24;
    const BOX_WIDTH = W_SP + W_IS + W_VAL + (CELL_PADDING_TOTAL * 3);
    const sx = LEFT_X + BOX_WIDTH + 8;
    const dx = RESULT_X - 8;
    DATA.forEach((d, i) => {
      const yy = TABLE_Y + HEADER_H + i * ROW_H + ROW_H / 2;
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('class', 'cw-arrow');
      p.setAttribute('marker-end', 'url(#cw-arrowhead)');
      p.setAttribute('d', `M ${sx} ${yy} L ${dx} ${yy}`);
      svg.appendChild(p);
      const len = p.getTotalLength();
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.style.opacity = 0;
      arrows.push({ p, len });
    });
    stage.appendChild(svg);

    return true;
  }

  function render(stage) {
    if (!build()) return;

    const nConds = 2;  // We have 2 conditions
    const showResult = stage >= nConds + 1;  // Stage 3+
    const highlightNew = stage >= nConds + 2;  // Stage 4+

    // Highlight condition labels in the title
    condSpans.forEach((span, i) => {
      const active = stage === i + 1;
      TM.anime({
        targets: span,
        backgroundColor: active ? COND_FILLS[i] : fade(COND_COLORS[i]),
        color: active ? COND_COLORS[i] : INK,
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });

    // Handle row highlighting based on stage
    condBoxes.forEach((box, i) => {
      let bgColor = 'transparent';

      if (!showResult && stage >= 1 && stage <= nConds) {
        // Show current condition's matches
        const currentCond = stage - 1;
        if (MATCHES[currentCond][i]) {
          bgColor = COND_FILLS[currentCond];
        }
      }

      TM.anime({
        targets: box,
        backgroundColor: bgColor,
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });

    // Draw arrows and show result column
    arrows.forEach(({ p, len }, k) => {
      TM.anime({
        targets: p,
        strokeDashoffset: showResult ? 0 : len,
        opacity: showResult ? 1 : 0,
        duration: 600,
        easing: 'easeInOutCubic',
        delay: showResult ? k * 90 : 0
      });
    });

    TM.anime({
      targets: resultCells,
      opacity: showResult ? 1 : 0,
      duration: 450,
      easing: 'easeInOutQuad',
      delay: showResult ? anime.stagger(50, { start: 520 }) : 0
    });

    // Highlight the new size_category column
    newColumnCells.forEach(cell => {
      TM.anime({
        targets: cell,
        backgroundColor: highlightNew ? 'rgba(74, 197, 134, 0.35)' : 'transparent',
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });
  }

  TM.gate({
    markerClass: 'cw-slide',
    fragmentIds: ['cw-cond-1', 'cw-cond-2', 'cw-result', 'cw-highlight-new'],
    render
  });
})();
</script>
