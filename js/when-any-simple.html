<script>
/* ---- when_any() simple - basic OR logic ----
 * Marker slide: .was-slide   Stage container: #was-stage
 * Shows how when_any() works with two simple conditions
 */
(function () {
  const TITLE_PRE = window.WAS_TITLE_PRE || 'filter(when_any(';
  const CONDS = window.WAS_CONDS || [];
  const TITLE_POST = window.WAS_TITLE_POST || '))';
  const DATA = window.WAS_DATA || [];
  const COLS = window.WAS_COLS || ['species', 'island', 'body_mass_g'];
  const MATCHES = window.WAS_MATCHES || [];

  const ROW_H = 44, HEADER_H = 40, TABLE_Y = 100;
  const LEFT_X = 50, RIGHT_X = 720;
  const W_SP = 100, W_IS = 100, W_VAL = 120;
  const ROW_W = W_SP + W_IS + W_VAL;

  function hexRGB(hex) {
    const n = parseInt(hex.replace('#', ''), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  const COND_COLORS = CONDS.map(c => {
    const [r, g, b] = hexRGB(c.color);
    return {
      fill: `rgba(${r}, ${g}, ${b}, 0.25)`,
      ink: c.color,
    };
  });

  const PASS_COLOR = 'rgba(74, 197, 134, 0.30)';
  const ROW_CLEAR = 'rgba(74, 134, 197, 0)';
  const INK = 'rgb(29, 36, 51)';

  function clear(rgba) {
    const n = rgba.match(/[\d.]+/g) || [0, 0, 0];
    return `rgba(${n[0]}, ${n[1]}, ${n[2]}, 0)`;
  }

  const N = DATA.length;
  const PASS = DATA.map((_, i) => MATCHES.some(cond => cond[i]));
  const passIdx = DATA.map((_, i) => i).filter(i => PASS[i]);
  const M = passIdx.length;

  let built = false;
  let condLabels = [];
  let leftRows = [];
  let rightEls = [];
  let arrows = [];

  function rowY(j) { return TABLE_Y + HEADER_H + j * ROW_H; }
  function rowCenterY(j) { return rowY(j) + ROW_H / 2; }

  function makeRow(sp, isl, val, isHead) {
    const row = document.createElement('div');
    row.className = 'was-row' + (isHead ? ' was-head' : '');
    const c1 = document.createElement('span'); c1.className = 'was-cell was-species'; c1.textContent = sp;
    const c2 = document.createElement('span'); c2.className = 'was-cell was-island'; c2.textContent = isl;
    const c3 = document.createElement('span'); c3.className = 'was-cell was-value'; c3.textContent = val;
    row.append(c1, c2, c3);
    return row;
  }

  function build() {
    const stage = document.getElementById('was-stage');
    if (!stage || built) return !!stage;
    built = true;

    // Title with when_any
    const title = document.createElement('div');
    title.className = 'was-title';
    title.appendChild(document.createTextNode(TITLE_PRE));

    CONDS.forEach((c, i) => {
      if (i > 0) {
        title.appendChild(document.createTextNode(', '));
      }
      const condSpan = document.createElement('span');
      condSpan.className = 'was-cond';
      condSpan.textContent = c.text;
      title.appendChild(condSpan);
      condLabels.push(condSpan);
    });

    title.appendChild(document.createTextNode(TITLE_POST));
    stage.appendChild(title);

    // ---- left table ----
    const lhead = makeRow(COLS[0], COLS[1], COLS[2], true);
    lhead.style.transform = `translate(${LEFT_X}px, ${TABLE_Y}px)`;
    stage.appendChild(lhead);

    DATA.forEach((d, i) => {
      const row = makeRow(d[0], d[1], d[2], false);
      row.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      stage.appendChild(row);
      leftRows.push(row);
    });

    // ---- right table (result) ----
    const rhead = makeRow(COLS[0], COLS[1], COLS[2], true);
    rhead.style.transform = `translate(${RIGHT_X}px, ${TABLE_Y}px)`;
    rhead.style.opacity = 0;
    stage.appendChild(rhead);
    rightEls.push(rhead);

    passIdx.forEach((srcI, j) => {
      const d = DATA[srcI];
      const row = makeRow(d[0], d[1], d[2], false);
      row.style.transform = `translate(${RIGHT_X}px, ${rowY(j)}px)`;
      row.style.opacity = 0;
      stage.appendChild(row);
      rightEls.push(row);
    });

    // ---- arrows ----
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('id', 'was-arrows-svg');
    const defs = document.createElementNS(svgNS, 'defs');
    const marker = document.createElementNS(svgNS, 'marker');
    marker.setAttribute('id', 'was-arrowhead');
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '8'); marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '7'); marker.setAttribute('markerHeight', '7');
    marker.setAttribute('orient', 'auto-start-reverse');
    const head = document.createElementNS(svgNS, 'path');
    head.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
    head.setAttribute('fill', '#4ac586');
    marker.appendChild(head); defs.appendChild(marker); svg.appendChild(defs);

    const sx = LEFT_X + ROW_W + 6;
    const dx = RIGHT_X - 8;
    passIdx.forEach((srcI, j) => {
      const syy = rowCenterY(srcI), dyy = rowCenterY(j);
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('class', 'was-arrow');
      p.setAttribute('marker-end', 'url(#was-arrowhead)');
      p.setAttribute('d', `M ${sx} ${syy} C ${sx + 100} ${syy}, ${dx - 100} ${dyy}, ${dx} ${dyy}`);
      svg.appendChild(p);
      const len = p.getTotalLength();
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.style.opacity = 0;
      arrows.push({ p, len });
    });
    stage.appendChild(svg);

    return true;
  }

  function render(stage) {
    if (!build()) return;

    const nConds = CONDS.length;

    // Highlight condition labels in the title
    condLabels.forEach((label, c) => {
      const active = stage >= c + 1;
      const cc = COND_COLORS[c];
      TM.anime({
        targets: label,
        backgroundColor: active ? cc.fill : clear(cc.fill),
        color: active ? cc.ink : INK,
        duration: 450, easing: 'easeInOutQuad',
      });
    });

    // Show which rows match each condition independently
    const showResult = stage >= nConds + 1;

    leftRows.forEach((row, i) => {
      let bgColor = ROW_CLEAR;
      let opacity = 1;

      if (showResult) {
        // Final stage: highlight passing rows
        if (PASS[i]) {
          bgColor = PASS_COLOR;
        } else {
          opacity = 0.25;
        }
      } else if (stage >= 1 && stage <= nConds) {
        // Show current condition's matches
        const currentCond = stage - 1;
        if (MATCHES[currentCond][i]) {
          bgColor = COND_COLORS[currentCond].fill;
        }
      }

      TM.anime({
        targets: row,
        backgroundColor: bgColor,
        opacity: opacity,
        duration: 450, easing: 'easeInOutQuad',
      });
    });

    // Draw arrows and show result
    arrows.forEach(({ p, len }, k) => {
      TM.anime({
        targets: p,
        strokeDashoffset: showResult ? 0 : len,
        opacity: showResult ? 1 : 0,
        duration: 600, easing: 'easeInOutCubic',
        delay: showResult ? k * 90 : 0,
      });
    });

    TM.anime({
      targets: rightEls,
      opacity: showResult ? 1 : 0,
      duration: 450, easing: 'easeInOutQuad',
      delay: showResult ? anime.stagger(50, { start: 520 }) : 0,
    });
  }

  TM.gate({
    markerClass: 'was-slide',
    fragmentIds: ['was-cond-1', 'was-cond-2', 'was-result'],
    render,
  });
})();
</script>
