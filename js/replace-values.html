<script>
/* ---- replace_values() ----
 * Marker slide: .repval-slide   Stage container: #repval-stage
 * Shows how replace_values() replaces "Northwest" with "Northern Palmer Archipelago"
 */
(function () {
  const DATA = window.REPVAL_DATA || [];
  const COLS = window.REPVAL_COLS || ['species', 'island', 'body_mass_g', 'island_location'];
  const MATCHES = window.REPVAL_MATCHES || [];
  const HIGHLIGHT_COLOR = window.REPVAL_HIGHLIGHT_COLOR || '#4a86c5';

  const ROW_H = 44, HEADER_H = 40, TABLE_Y = 140;
  const LEFT_X = 30;
  const W_SP = 90, W_IS = 90, W_VAL = 110, W_LOC = 160;
  const ROW_W = W_SP + W_IS + W_VAL + W_LOC;
  const ARROW_GAP = 120;
  const RESULT_X = LEFT_X + ROW_W + ARROW_GAP;

  function hexRGB(hex) {
    const n = parseInt(hex.replace('#', ''), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function fade(hex) {
    const [r, g, b] = hexRGB(hex);
    return `rgba(${r}, ${g}, ${b}, 0)`;
  }

  const [r, g, b] = hexRGB(HIGHLIGHT_COLOR);
  const HIGHLIGHT_FILL = `rgba(${r}, ${g}, ${b}, 0.25)`;

  const INK = 'rgb(29, 36, 51)';
  const N = DATA.length;

  let built = false;
  let leftRows = [];
  let valueBoxes = [];
  let valueSpan;
  let resultCells = [];
  let arrows = [];
  let newValueCells = [];

  function rowY(j) { return TABLE_Y + HEADER_H + j * ROW_H; }

  function makeRow(sp, isl, val, location, isHead, newLocation) {
    const row = document.createElement('div');
    row.className = 'repval-row' + (isHead ? ' repval-head' : '');
    const c1 = document.createElement('span'); c1.className = 'repval-cell repval-species'; c1.textContent = sp;
    const c2 = document.createElement('span'); c2.className = 'repval-cell repval-island'; c2.textContent = isl;
    const c3 = document.createElement('span'); c3.className = 'repval-cell repval-value'; c3.textContent = val;
    const c4 = document.createElement('span'); c4.className = 'repval-cell repval-location'; c4.textContent = newLocation !== undefined ? newLocation : location;
    row.append(c1, c2, c3, c4);
    return row;
  }

  function build() {
    const stage = document.getElementById('repval-stage');
    if (!stage || built) return !!stage;
    built = true;

    // Title
    const title = document.createElement('div');
    title.className = 'repval-title';
    title.appendChild(document.createTextNode('mutate(island_location = island_location |> replace_values('));

    const valSpan = document.createElement('span');
    valSpan.className = 'repval-val';
    valSpan.textContent = '"Northwest" ~ "Northern Palmer Archipelago"';
    valueSpan = valSpan;
    title.appendChild(valSpan);

    title.appendChild(document.createTextNode('))'));
    stage.appendChild(title);

    // Left table
    const lhead = makeRow(COLS[0], COLS[1], COLS[2], COLS[3], true);
    lhead.style.transform = `translate(${LEFT_X}px, ${TABLE_Y}px)`;
    stage.appendChild(lhead);

    DATA.forEach((d, i) => {
      const row = makeRow(d[0], d[1], d[2], d[3], false);
      row.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      stage.appendChild(row);
      leftRows.push(row);

      // Create highlight boxes for matching rows
      const CELL_PADDING_TOTAL = 24;
      const BOX_WIDTH = W_SP + W_IS + W_VAL + W_LOC + (CELL_PADDING_TOTAL * 4);
      const box = document.createElement('div');
      box.className = 'repval-value-box';
      box.style.position = 'absolute';
      box.style.width = `${BOX_WIDTH}px`;
      box.style.height = `${ROW_H}px`;
      box.style.transform = `translate(${LEFT_X}px, ${rowY(i)}px)`;
      box.style.backgroundColor = 'transparent';
      box.style.pointerEvents = 'none';
      stage.appendChild(box);
      valueBoxes.push(box);
    });

    // Result table
    const rhead = makeRow(COLS[0], COLS[1], COLS[2], COLS[3], true);
    rhead.style.transform = `translate(${RESULT_X}px, ${TABLE_Y}px)`;
    rhead.style.opacity = 0;
    stage.appendChild(rhead);
    resultCells.push(rhead);

    DATA.forEach((d, i) => {
      const newLabel = MATCHES[i] ? 'Northern Palmer Archipelago' : d[3];
      const row = makeRow(d[0], d[1], d[2], d[3], false, newLabel);
      row.style.transform = `translate(${RESULT_X}px, ${rowY(i)}px)`;
      row.style.opacity = 0;
      stage.appendChild(row);
      resultCells.push(row);

      const locationCell = row.children[3];
      if (locationCell && MATCHES[i]) {
        newValueCells.push(locationCell);
      }
    });

    // Arrows
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('id', 'repval-arrows-svg');
    const defs = document.createElementNS(svgNS, 'defs');
    const marker = document.createElementNS(svgNS, 'marker');
    marker.setAttribute('id', 'repval-arrowhead');
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '8'); marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '7'); marker.setAttribute('markerHeight', '7');
    marker.setAttribute('orient', 'auto-start-reverse');
    const head = document.createElementNS(svgNS, 'path');
    head.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
    head.setAttribute('fill', '#4ac586');
    marker.appendChild(head); defs.appendChild(marker); svg.appendChild(defs);

    const CELL_PADDING_TOTAL = 24;
    const BOX_WIDTH = W_SP + W_IS + W_VAL + W_LOC + (CELL_PADDING_TOTAL * 4);
    const sx = LEFT_X + BOX_WIDTH + 8;
    const dx = RESULT_X - 8;
    DATA.forEach((d, i) => {
      const yy = TABLE_Y + HEADER_H + i * ROW_H + ROW_H / 2;
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('class', 'repval-arrow');
      p.setAttribute('marker-end', 'url(#repval-arrowhead)');
      p.setAttribute('d', `M ${sx} ${yy} L ${dx} ${yy}`);
      svg.appendChild(p);
      const len = p.getTotalLength();
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.style.opacity = 0;
      arrows.push({ p, len });
    });
    stage.appendChild(svg);

    return true;
  }

  function render(stage) {
    if (!build()) return;

    const showHighlight = stage >= 1;
    const showResult = stage >= 2;
    const highlightNew = stage >= 3;

    // Highlight value label in title
    TM.anime({
      targets: valueSpan,
      backgroundColor: showHighlight ? HIGHLIGHT_FILL : fade(HIGHLIGHT_COLOR),
      color: showHighlight ? HIGHLIGHT_COLOR : INK,
      duration: 450,
      easing: 'easeInOutQuad'
    });

    // Highlight matching rows
    valueBoxes.forEach((box, i) => {
      const bgColor = showHighlight && !showResult && MATCHES[i] ? HIGHLIGHT_FILL : 'transparent';
      TM.anime({
        targets: box,
        backgroundColor: bgColor,
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });

    // Draw arrows and show result
    arrows.forEach(({ p, len }, k) => {
      TM.anime({
        targets: p,
        strokeDashoffset: showResult ? 0 : len,
        opacity: showResult ? 1 : 0,
        duration: 600,
        easing: 'easeInOutCubic',
        delay: showResult ? k * 90 : 0
      });
    });

    TM.anime({
      targets: resultCells,
      opacity: showResult ? 1 : 0,
      duration: 450,
      easing: 'easeInOutQuad',
      delay: showResult ? anime.stagger(50, { start: 520 }) : 0
    });

    // Highlight new values
    newValueCells.forEach(cell => {
      TM.anime({
        targets: cell,
        backgroundColor: highlightNew ? 'rgba(74, 197, 134, 0.35)' : 'transparent',
        duration: 450,
        easing: 'easeInOutQuad'
      });
    });
  }

  TM.gate({
    markerClass: 'repval-slide',
    fragmentIds: ['repval-highlight', 'repval-result', 'repval-highlight-new'],
    render
  });
})();
</script>
